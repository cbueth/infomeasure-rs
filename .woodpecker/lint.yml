workspace:
  base: /build
  path: .

when:
  - event: [push, pull_request]
    branch: [main, develop]

matrix:
  RUST: [stable, beta]

steps:
  - name: fmt
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      CARGO_HOME: /usr/local/cargo
      CARGO_TARGET_DIR: /usr/local/cargo/target
    commands:
      - cargo fmt --all -- --check

  - name: clippy
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      CARGO_HOME: /usr/local/cargo
      CARGO_TARGET_DIR: /usr/local/cargo/target
    commands:
      - cargo clippy --all-targets --all-features -- -D warnings -W clippy::cargo

  - name: doc
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      RUSTDOCFLAGS: "-D warnings --html-in-header katex-header.html"
      CARGO_HOME: /usr/local/cargo
      CARGO_TARGET_DIR: /usr/local/cargo/target
    commands:
      - cargo doc --no-deps --all-features
