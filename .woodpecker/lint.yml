workspace:
  base: /build
  path: .

when:
  - event: [push, pull_request]
    branch: [main, develop]
  - event: manual

matrix:
  RUST: [stable, beta]

steps:
  - name: debug
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - |
        echo "=== Environment ==="
        echo "CARGO_HOME: $CARGO_HOME"
        echo "CARGO_TARGET_DIR: $CARGO_TARGET_DIR"
        echo "PATH: $PATH"
        echo ""
        echo "=== /root/.cargo ==="
        ls -la /root/.cargo/
        echo ""
        echo "=== /root/.cargo/target (first 20) ==="
        ls /root/.cargo/target/ 2>/dev/null | head -20 || echo "target dir not found"
        echo ""
        echo "=== /build ==="
        ls -la /build/
        echo ""
        echo "=== which cargo ==="
        which cargo
        cargo --version
        rustc --version

  - name: fmt
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - cargo fmt --all -- --check

  - name: clippy
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - cargo clippy --all-targets --all-features -- -D warnings -W clippy::cargo

  - name: doc
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      RUSTDOCFLAGS: "-D warnings --html-in-header katex-header.html"
    commands:
      - cargo doc --no-deps --all-features
