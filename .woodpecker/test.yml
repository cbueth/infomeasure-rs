workspace:
  base: /build
  path: .

when:
  - event: [push, pull_request]
    branch: [main, develop]
    path:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - tests/**
  - event: manual

matrix:
  RUST: [stable, beta]
  FEATURES: [""]  # fast_exp degrades the accuracy, making tests fail; not testing gpu on CI


steps:
  - name: debug
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - |
        echo "=== Environment ==="
        echo "CARGO_HOME: ${CARGO_HOME:-unset}"
        echo "CARGO_TARGET_DIR: ${CARGO_TARGET_DIR:-unset}"
        echo "PATH: $PATH"
        echo ""
        echo "=== /usr/local/cargo (expected cargo home) ==="
        ls -la /usr/local/cargo/ 2>/dev/null || echo "not found"
        echo ""
        echo "=== /usr/local/cargo/target (first 20) ==="
        ls /usr/local/cargo/target/ 2>/dev/null | head -20 || echo "not found"
        echo ""
        echo "=== /root/.cargo (old location - should not exist) ==="
        ls -la /root/.cargo/ 2>/dev/null || echo "not found (expected)"
        echo ""
        echo "=== /build ==="
        ls -la /build/
        echo ""
        echo "=== which cargo ==="
        which cargo
        cargo --version
        rustc --version

  - name: build
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      FEATURES: ${FEATURES}
      RUST: ${RUST}
    commands:
      - if [ -n "${FEATURES}" ]; then
          cargo build -j 4 --workspace --features ${FEATURES};
        else
          cargo build -j 4 --workspace;
        fi

  - name: test
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      FEATURES: ${FEATURES}
      RUST: ${RUST}
    commands:
      - if [ -n "${FEATURES}" ]; then
          cargo test -j 4 --workspace --features ${FEATURES};
        else
          cargo test -j 4 --workspace;
        fi

  - name: doctest
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - cargo test --doc
