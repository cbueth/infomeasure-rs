workspace:
  base: /build
  path: .

when:
  - event: [push, pull_request]
    branch: [main, develop]
    path:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - tests/**
  - event: manual

matrix:
  RUST: [stable, beta]
  FEATURES: [""]  # fast_exp degrades the accuracy, making tests fail; not testing gpu on CI


steps:
  - name: debug
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - |
        set -e
        echo "=== Environment ==="
        echo "CARGO_HOME: ${CARGO_HOME:-unset}"
        echo "CARGO_TARGET_DIR: ${CARGO_TARGET_DIR:-unset}"
        echo ""
        echo "=== /usr/local/cargo ==="
        test -d /usr/local/cargo && echo "exists" || echo "not found"
        echo "=== /usr/local/cargo/target (first 10) ==="
        test -d /usr/local/cargo/target && ls -d /usr/local/cargo/target/*/ 2>/dev/null | head -10 || echo "not found"
        echo "=== /root/.cargo ==="
        test -d /root/.cargo && echo "exists" || echo "not found (expected)"
        echo "=== /build ==="
        ls -la /build/ | head -20
        echo ""
        echo "=== cargo versions ==="
        cargo --version
        rustc --version

  - name: build
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      FEATURES: ${FEATURES}
      RUST: ${RUST}
    commands:
      - if [ -n "${FEATURES}" ]; then
          cargo build -j 4 --workspace --features ${FEATURES} --locked;
        else
          cargo build -j 4 --workspace --locked;
        fi

  - name: test
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    environment:
      FEATURES: ${FEATURES}
      RUST: ${RUST}
    commands:
      - if [ -n "${FEATURES}" ]; then
          cargo test -j 4 --workspace --features ${FEATURES} --locked;
        else
          cargo test -j 4 --workspace --locked;
        fi

  - name: doctest
    image: codeberg.org/cbueth/infomeasure-rs:${RUST}
    commands:
      - cargo test --doc --locked
