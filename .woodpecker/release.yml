# Automated release workflow using plugin-ready-release-go
#
# Flow:
# 1. Push to main → Creates Release PR (preparation)
# 2. Release PR merged (with "release" label) → plugin creates tag/release on Codeberg
# 3. cargo publish runs on the merge commit (detected via commit message pattern)

when:
  - event: push
    branch: main

steps:
  - name: release-pr
    image: woodpeckerci/plugin-ready-release-go
    settings:
      git_email: ci@cbueth.de
      forge_token:
        from_secret: FORGE_TOKEN
      forge_type: gitea
      release_prefix: Release

  - name: publish-crates
    image: rust
    environment:
      CARGO_REGISTRY_TOKEN:
        from_secret: crates_io_token
    commands:
      - cargo publish
    when:
      - evaluate: 'CI_COMMIT_MESSAGE matches "^Merge pull request.*Release.*from next-release/main"'
