# Creates/updates Release PR on every push to main
# release-plz creates a PR with changelog

when:
  - event: push
    branch: main

steps:
  - name: release-pr
    image: rust:latest
    environment:
      RELEASE_PLZ_TOKEN:
        from_secret: codeberg_token
    commands:
      - cargo install --locked release-plz
      - git config --global user.email "ci@cbueth.de"
      - git config --global user.name "release-plz bot"
      - export PATH="$HOME/.cargo/bin:$PATH"
      - release-plz release-pr --forge gitea
