# Creates/updates Release PR on every push to main
# release-plz creates a PR with changelog

when:
  - event: push
    branch: main
  - event: manual

steps:
  - name: install-release-plz
    image: rust:latest
    commands:
      - cargo install --locked release-plz

  - name: release-pr
    image: rust:latest
    environment:
      RELEASE_PLZ_TOKEN:
        from_secret: codeberg_token
    commands:
      - export PATH="$HOME/.cargo/bin:$PATH"
      - release-plz release-pr --forge gitea
